name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  # Manual trigger so CI can be re-run on demand — e.g. to confirm the verify gate is green
  # after the "Record screenshots" workflow commits fresh ubuntu-latest baselines (a GITHUB_TOKEN
  # push from that workflow does not itself re-trigger CI).
  workflow_dispatch:

# The Gradle project lives in the Shrine/ subdirectory of the repo.
defaults:
  run:
    working-directory: Shrine

jobs:
  build:
    name: Lint · Unit tests · Assemble
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      # Robolectric-backed JVM tests: repositories, PasswordHasher (incl. SHA1→SHA256 migration),
      # money math, ViewModels (Turbine, incl. search debounce), Compose UI tests, Room DB integrity
      # — plus Roborazzi screenshot verification of the design-system gallery AND the per-screen
      # ScreenScreenshotTest (light + dark).
      - name: Unit tests + screenshot verification
        run: ./gradlew testDebugUnitTest -Proborazzi.test.verify=true

      - name: Android Lint
        run: ./gradlew lintDebug

      - name: Assemble debug APK
        run: ./gradlew assembleDebug

      # ---------------------------------------------------------------------------
      # Instrumented inset/overlap gate (plan_9 Phase D / item 17) — MANUAL / pre-release.
      # InsetOverlapTest needs a real device or emulator (Robolectric doesn't draw system bars), so
      # it is NOT run in this JVM job. Run it before a release with an emulator attached:
      #
      #     ./gradlew connectedDebugAndroidTest
      #
      # To wire it into CI instead, add a separate job on a macOS/KVM runner using
      # `reactivecircus/android-emulator-runner` across a nav-mode + cutout matrix.
      # ---------------------------------------------------------------------------

      - name: Upload test & lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            Shrine/**/build/reports
            Shrine/**/build/outputs/roborazzi
